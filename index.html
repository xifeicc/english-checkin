<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习打卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            text-align: center;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-decoration: none;
            display: block;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .card-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }
        .badge-blue { background: #e3f2fd; color: #1976d2; }
        .badge-purple { background: #f3e5f5; color: #7b1fa2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>英语学习打卡</h1>
        <div class="subtitle">选择你要学习的课程</div>

        <a href="powerup.html" class="card">
            <div class="card-icon">🚀</div>
            <div class="card-title">Power Up 2 每日打卡</div>
            <div class="card-desc">剑桥少儿英语 A1+-A2 级别，6个单元每单元5天独立内容，自动轮换绘本故事、阅读理解、口语对话</div>
            <div class="card-badge badge-purple">剑桥少儿英语</div>
        </a>

        <a href="renjiaoban.html" class="card">
            <div class="card-icon">📚</div>
            <div class="card-title">人教版三年级下册 每日打卡</div>
            <div class="card-desc">按学校课程进度，看图识词、连线配对、单词跟读、情景交流四种学习模式</div>
            <div class="card-badge badge-blue">人教版 PEP</div>
        </a>
    </div>
</body>
</html>
