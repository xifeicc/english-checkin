<html lang="zh-CN">

    * {

      padding: 0;
      box-sizing: border-box;

      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      color: white;

      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);

    .header h2 {
      color: #fbbf24;
      font-size: 2rem;
      margin-bottom: 15px;
    }
    .header p {
      color: white;
      font-size: 1.2rem;
    }
    .emoji-big {
      font-size: 5rem;
      display: block;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    .wiggle {
      animation: wiggle 1s infinite;
    }
    .progress-card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .progress-bar-container {
      width: 100%;
      background: #e5e7eb;
      border-radius: 999px;
      height: 24px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(to right, #a855f7, #ec4899);
      height: 100%;
      transition: width 0.5s ease;
      border-radius: 999px;
    }
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .lesson-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      padding: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);

    .lesson-card:hover {
      transform: scale(1.05) rotate(2deg);

    .lesson-card.orange { background: linear-gradient(135deg, #f97316, #ef4444); }
    .lesson-card.indigo { background: linear-gradient(135deg, #6366f1, #a855f7); }

      font-size: 3.5rem;
      margin-bottom: 10px;
    }
    .lesson-title {
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

      color: rgba(255,255,255,0.9);
      font-size: 1rem;
    }
    .checkmark {
      font-size: 2.5rem;

      font-size: 2rem;
      margin-bottom: 15px;
    }

      font-size: 1.3rem;
      font-weight: bold;

      font-size: 2rem;
      margin-bottom: 20px;
      text-align: center;
    }

      padding: 20px;

    .mode-desc {
      color: #6b7280;
      margin-top: 5px;

      padding: 10px 25px;
      border-radius: 999px;
      font-size: 1.1rem;

      margin-bottom: 20px;

      background: white;

      padding: 20px;

      position: fixed;
      width: 10px;
      height: 10px;

</head>

              </div>
              <p style="line-height: 1.8;">走路的时候不要看着地面！把准星放在<strong>门口、拐角处</strong>，这样敌人一出现你就能立刻开枪。</p>
            </div>

            <div style="background: linear-gradient(135deg, #a855f7, #d946ef); border-radius: 15px; padding: 20px; margin: 20px 0; color: white;">
              <div style="display: flex; align-items: center; margin-bottom: 15px;">
                <span style="font-size: 2.5rem; margin-right: 15px;">👂</span>
                <h3 style="margin: 0; font-size: 1.5rem;">4. 用耳朵听</h3>
              </div>
              <p style="line-height: 1.8;">戴上耳机！你可以听到脚步声、枪声、技能声音，知道敌人在哪！</p>
            </div>

            <div style="background: linear-gradient(135deg, #fbbf24, #f97316); border-radius: 15px; padding: 20px; margin: 20px 0; color: white;">
              <div style="display: flex; align-items: center; margin-bottom: 15px;">
                <span style="font-size: 2.5rem; margin-right: 15px;">🤝</span>
                <h3 style="margin: 0; font-size: 1.5rem;">5. 和队友合作</h3>
              </div>
              <p style="line-height: 1.8;">这是<strong>团队游戏</strong>！和好朋友一起互相报告敌人位置，一起攻击同一个敌人，队友倒地去救他！</p>
            </div>

            <div class="info-box" style="background: #dcfce7; border-color: #22c55e;">
              <h3 style="color: #166534;">🌟 新手生存口诀：</h3>
              <div style="line-height: 2.5; font-size: 1.2rem;">
                <p>🏃 <strong>见人就躲</strong>（先找掩体）</p>
                <p>👀 <strong>先看再打</strong>（观察情况）</p>
                <p>🎯 <strong>瞄准再开枪</strong>（不要乱打）</p>

            </div>
          </div>

      },
      {
        id: 6,
        title: "和好朋友一起玩",
        emoji: "👫",
        color: "pink",
        content: `
          <div style="text-align: center;">

            <h2>这才是游戏的乐趣！</h2>
            
            <div class="info-box" style="text-align: left;">

              </ul>
            </div>

            <div style="background: linear-gradient(135deg, #fbbf24, #f97316); border-radius: 15px; padding: 25px; margin: 25px 0;">
              <h3 style="color: white; margin-bottom: 20px; font-size: 1.5rem;">🚀 第一步怎么做？</h3>
              <div style="text-align: left; color: white;">
                <div style="display: flex; margin-bottom: 20px;">
                  <span style="font-size: 2.5rem; margin-right: 15px;">1️⃣</span>

                    <p>"我也想玩三角洲行动，可以教我吗？"</p>

                <div style="display: flex; margin-bottom: 20px;">
                  <span style="font-size: 2.5rem; margin-right: 15px;">2️⃣</span>
                  <div>
                    <p style="font-weight: bold; font-size: 1.2rem; margin-bottom: 5px;">邀请他们带你玩</p>
                    <p>"我们一起打黑鹰坠落战役吧！"</p>
                  </div>
                </div>
                <div style="display: flex; margin-bottom: 20px;">
                  <span style="font-size: 2.5rem; margin-right: 15px;">3️⃣</span>
                  <div>
                    <p style="font-weight: bold; font-size: 1.2rem; margin-bottom: 5px;">不要怕菜</p>
                    <p>每个高手都是从新手开始的！</p>
                  </div>
                </div>
                <div style="display: flex;">
                  <span style="font-size: 2.5rem; margin-right: 15px;">4️⃣</span>
                  <div>
                    <p style="font-weight: bold; font-size: 1.2rem; margin-bottom: 5px;">玩得开心</p>
                    <p>输赢不重要，和朋友一起玩才重要！</p>

                </div>
              </div>
            </div>

            <div class="info-box" style="background: #f3e8ff; border-color: #a855f7;">
              <h3 style="color: #6b21a8;">💬 可以和好朋友聊：</h3>
              <div style="line-height: 2;">
                <p>• "你最喜欢哪个干员？"</p>
                <p>• "你觉得 M4A1 好用还是 AK 好用？"</p>
                <p>• "上次我们打的那个关卡好难啊！"</p>
                <p>• "这周末一起玩好不好？"</p>
              </div>
            </div>

            <div style="background: linear-gradient(135deg, #22c55e, #3b82f6); border-radius: 15px; padding: 30px; margin-top: 25px;">
              <div style="font-size: 3rem; margin-bottom: 15px;">🎊</div>
              <h3 style="color: white; font-size: 1.8rem; margin-bottom: 15px;">恭喜你学完所有课程！</h3>
              <p style="color: white; font-size: 1.3rem; line-height: 2;">
                现在你已经准备好和好朋友一起玩了！
                <br/>
                <strong>加油，小特种兵！</strong> 💪
              </p>
            </div>
          </div>
        `
      }
    ];

    const quizQuestions = [
      { question: "新手应该从哪个模式开始玩？", options: ["危险行动", "全面战场", "黑鹰坠落战役", "随便哪个"], answer: 2 },
      { question: "哪个键是捡东西的？", options: ["W", "F", "R", "T"], answer: 1 },
      { question: "新手最推荐用什么武器？", options: ["狙击枪", "霰弹枪", "M4A1 突击步枪", "手枪"], answer: 2 },
      { question: "看到敌人应该先做什么？", options: ["直接冲", "找掩体躲起来", "闭上眼睛", "逃跑"], answer: 1 },
      { question: "这个游戏最重要的是什么？", options: ["枪法准", "和朋友一起玩", "装备好", "等级高"], answer: 1 }
    ];

    function App() {
      const [view, setView] = useState('home');
      const [selectedLesson, setSelectedLesson] = useState(null);
      const [completed, setCompleted] = useState([]);
      const [quizIndex, setQuizIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [score, setScore] = useState(null);
      const [correctCount, setCorrectCount] = useState(0);

      const progress = Math.round((completed.length / lessons.length) * 100);

      const createConfetti = () => {
        const colors = ['#ff0', '#f00', '#0f0', '#00f', '#f0f', '#0ff'];
        for (let i = 0; i < 50; i++) {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      };

      const handleComplete = (id) => {
        if (!completed.includes(id)) {
          setCompleted([...completed, id]);
        }
        setView('home');
      };

      const handleQuizAnswer = (index) => {
        setSelectedAnswer(index);
        if (index === quizQuestions[quizIndex].answer) {
          setCorrectCount(correctCount + 1);
        }
      };

      const handleNextQuestion = () => {
        if (quizIndex < quizQuestions.length - 1) {
          setQuizIndex(quizIndex + 1);
          setSelectedAnswer(null);
        } else {
          const finalScore = (correctCount / quizQuestions.length) * 100;
          setScore(finalScore);
          if (finalScore >= 60) {
            createConfetti();
          }
        }
      };

      const resetQuiz = () => {
        setQuizIndex(0);
        setSelectedAnswer(null);
        setScore(null);
        setCorrectCount(0);
      };

      // 首页
      if (view === 'home') {
        return (
          <div className="container">
            <div className="header">
              <span className="emoji-big">🎯</span>
              <h1>三角洲行动</h1>
              <h2>👾 小朋友入门指南 👾</h2>
              <p>学会这些，就能和好朋友一起聊天玩游戏啦！</p>
            </div>

            <div className="progress-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                <span style={{ fontWeight: 'bold', fontSize: '1.2rem' }}>📊 学习进度</span>
                <span style={{ color: '#a855f7', fontWeight: 'bold', fontSize: '1.3rem' }}>{progress}%</span>
              </div>
              <div className="progress-bar-container">
                <div className="progress-bar" style={{ width: `${progress}%` }}></div>
              </div>
              <p style={{ marginTop: '10px', color: '#6b7280' }}>
                ✨ 已完成 {completed.length} / {lessons.length} 个课程
                {completed.length === lessons.length && <span style={{ marginLeft: '10px', color: '#ec4899' }}>🎉 太棒了！</span>}
              </p>
            </div>

            <div className="lessons-grid">
              {lessons.map((lesson) => (
                <div 
                  key={lesson.id}
                  className={`lesson-card ${lesson.color}`}
                  onClick={() => { setSelectedLesson(lesson); setView('lesson'); }}
                >
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '15px' }}>
                    <span className="lesson-emoji">{lesson.emoji}</span>
                    {completed.includes(lesson.id) ? (
                      <span className="checkmark">✅</span>
                    ) : (
                      <span style={{ fontSize: '2rem', opacity: 0.5 }}>⭕</span>
                    )}
                  </div>
                  <div className="lesson-title">{lesson.title}</div>
                  <div className="lesson-hint">点击开始学习 →</div>
                </div>
              ))}
            </div>

            <div className="quiz-section">
              <span style={{ fontSize: '4rem', display: 'block', marginBottom: '15px' }}>🏆</span>
              <h3>学完来挑战吧！</h3>
              <p>回答{quizQuestions.length}个问题，看看你学会了多少～</p>
              <button className="btn" onClick={() => { resetQuiz(); setView('quiz'); }}>
                🚀 开始挑战
              </button>
            </div>
          </div>
        );
      }

      // 课程页
      if (view === 'lesson' && selectedLesson) {
        return (
          <div className="container">
            <button className="back-btn" onClick={() => setView('home')}>
              ← 返回首页
            </button>
            <div className="lesson-content">
              <div dangerouslySetInnerHTML={{ __html: selectedLesson.content }} />
              <button 
                className="btn btn-primary" 
                style={{ marginTop: '30px' }}
                onClick={() => handleComplete(selectedLesson.id)}
              >
                {completed.includes(selectedLesson.id) ? '✓ 已经完成啦！' : '✨ 我学完了！'}
              </button>
            </div>
          </div>
        );
      }

      // 测试页
      if (view === 'quiz') {
        if (score !== null) {
          return (
            <div className="container" style={{ maxWidth: '600px' }}>
              <div className="lesson-content" style={{ textAlign: 'center' }}>
                <span style={{ fontSize: '5rem', display: 'block', marginBottom: '20px' }}>🏆</span>
                <h2 style={{ color: '#a855f7', fontSize: '2.5rem', marginBottom: '20px' }}>挑战完成！</h2>
                <div style={{ fontSize: '5rem', fontWeight: 'bold', background: 'linear-gradient(to right, #fbbf24, #f97316)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '20px' }}>
                  {Math.round(score)}分
                </div>
                <p style={{ fontSize: '1.5rem', color: '#6b7280', marginBottom: '30px' }}>
                  {score >= 80 ? '🌟 太厉害了！你是天才！' : score >= 60 ? '✨ 很棒！继续加油！' : '💪 不错哦，再看看教程～'}
                </p>
                <div style={{ display: 'flex', gap: '15px' }}>
                  <button className="btn btn-primary" onClick={() => setView('home')}>🏠 返回首页</button>
                  <button className="btn" style={{ background: '#e5e7eb', color: '#374151' }} onClick={() => { resetQuiz(); setView('quiz'); }}>🔄 再玩一次</button>
                </div>
              </div>
            </div>
          );
        }

        const question = quizQuestions[quizIndex];
        return (
          <div className="container" style={{ maxWidth: '700px' }}>
            <div style={{ marginBottom: '30px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px', color: 'white' }}>
                <span style={{ fontWeight: 'bold', fontSize: '1.2rem' }}>问题 {quizIndex + 1} / {quizQuestions.length}</span>
                <button onClick={() => setView('home')} style={{ background: 'transparent', border: 'none', color: 'white', cursor: 'pointer', fontSize: '1rem' }}>退出挑战</button>
              </div>
              <div className="progress-bar-container">
                <div className="progress-bar" style={{ width: `${((quizIndex + 1) / quizQuestions.length) * 100}%`, background: '#fbbf24' }}></div>
              </div>
            </div>

            <div className="lesson-content">
              <span style={{ fontSize: '3rem', display: 'block', marginBottom: '20px' }}>🤔</span>
              <h2 style={{ color: '#1f2937', marginBottom: '25px', fontSize: '1.5rem' }}>{question.question}</h2>
              <div>
                {question.options.map((option, index) => (
                  <div 
                    key={index}
                    className={`quiz-option ${selectedAnswer === index ? 'selected' : ''}`}
                    onClick={() => handleQuizAnswer(index)}
                  >
                    <strong style={{ marginRight: '10px' }}>{String.fromCharCode(65 + index)}.</strong>
                    {option}
                  </div>
                ))}
              </div>
              <button 
                className="btn btn-success" 
                style={{ marginTop: '25px', width: '100%' }}
                disabled={selectedAnswer === null}
                onClick={handleNextQuestion}
              >
                {quizIndex < quizQuestions.length - 1 ? '下一题 →' : '交卷！🎉'}
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
